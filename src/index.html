<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBM Bob Notepad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Carbon design tokens ── */
    :root {
      --cds-background:          #f4f4f4;
      --cds-layer-01:            #ffffff;
      --cds-layer-02:            #e8e8e8;
      --cds-border-subtle-01:    #e0e0e0;
      --cds-border-strong-01:    #8d8d8d;
      --cds-text-primary:        #161616;
      --cds-text-secondary:      #525252;
      --cds-text-placeholder:    #a8a8a8;
      --cds-text-on-color:       #ffffff;
      --cds-interactive:         #0f62fe;
      --cds-interactive-hover:   #0353e9;
      --cds-focus:               #0f62fe;
      --cds-support-success:     #198038;
      --cds-support-warning:     #f1c21b;
      --cds-support-error:       #da1e28;
      --cds-icon-primary:        #161616;
      --cds-icon-secondary:      #525252;
      --cds-icon-on-color:       #ffffff;
      --cds-shell-header-bg:     #161616;
      --cds-shell-header-text:   #f4f4f4;
      --cds-shell-header-border: #393939;
      --cds-spacing-01: 2px;
      --cds-spacing-02: 4px;
      --cds-spacing-03: 8px;
      --cds-spacing-04: 12px;
      --cds-spacing-05: 16px;
      --cds-spacing-06: 24px;
      --cds-spacing-07: 32px;
      --cds-spacing-08: 40px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.42857;
      background: var(--cds-background);
      color: var(--cds-text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Carbon UI Shell Header ── */
    .cds--header {
      background: var(--cds-shell-header-bg);
      border-bottom: 1px solid var(--cds-shell-header-border);
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 var(--cds-spacing-05);
      flex-shrink: 0;
      gap: var(--cds-spacing-05);
    }
    .cds--header__name {
      color: var(--cds-shell-header-text);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .1px;
      white-space: nowrap;
      text-decoration: none;
      margin-right: auto;
    }
    .cds--header__name span {
      font-weight: 400;
      color: #c6c6c6;
    }

    /* health bar in header */
    .header-health {
      display: flex;
      align-items: center;
      gap: var(--cds-spacing-03);
      font-size: 12px;
      color: #c6c6c6;
      white-space: nowrap;
    }
    .cds--progress-bar--header {
      width: 140px;
      height: 4px;
      background: #393939;
      overflow: hidden;
    }
    .cds--progress-bar__bar {
      height: 100%;
      background: var(--cds-support-success);
      transition: width .5s ease, background .5s ease;
    }

    /* ── Carbon Ghost Button (header) ── */
    .cds--btn--ghost--sm {
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      color: #c6c6c6;
      background: transparent;
      border: 1px solid #525252;
      padding: 0 var(--cds-spacing-04);
      height: 32px;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
    }
    .cds--btn--ghost--sm:hover {
      background: #353535;
      color: #f4f4f4;
      border-color: #6f6f6f;
    }

    /* ── Toolbar row ── */
    .cds--toolbar {
      display: flex;
      align-items: flex-end;
      gap: var(--cds-spacing-03);
      padding: var(--cds-spacing-05) var(--cds-spacing-05) var(--cds-spacing-03);
      flex-shrink: 0;
      background: var(--cds-background);
    }

    /* ── Carbon Text Input ── */
    .cds--form-item { flex: 1; display: flex; flex-direction: column; gap: var(--cds-spacing-01); }
    .cds--label {
      font-size: 12px;
      font-weight: 400;
      color: var(--cds-text-secondary);
      letter-spacing: .32px;
      margin-bottom: var(--cds-spacing-01);
    }
    .cds--text-input {
      font-family: inherit;
      font-size: 14px;
      color: var(--cds-text-primary);
      background: var(--cds-layer-01);
      border: none;
      border-bottom: 1px solid var(--cds-border-strong-01);
      outline: none;
      height: 40px;
      padding: 0 var(--cds-spacing-04);
      width: 100%;
    }
    .cds--text-input::placeholder { color: var(--cds-text-placeholder); }
    .cds--text-input:focus {
      outline: 2px solid var(--cds-focus);
      outline-offset: -2px;
    }

    /* ── Carbon Primary Button ── */
    .cds--btn--primary {
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      background: var(--cds-interactive);
      color: var(--cds-text-on-color);
      border: none;
      height: 40px;
      padding: 0 var(--cds-spacing-07);
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      letter-spacing: .16px;
      flex-shrink: 0;
    }
    .cds--btn--primary:hover { background: var(--cds-interactive-hover); }
    .cds--btn--primary:focus {
      outline: 2px solid var(--cds-focus);
      outline-offset: -2px;
      box-shadow: inset 0 0 0 1px var(--cds-focus), inset 0 0 0 2px #ffffff;
    }

    /* ── Task list ── */
    #task-list-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: var(--cds-spacing-03) var(--cds-spacing-05) var(--cds-spacing-06);
    }
    #task-list { list-style: none; }

    /* Carbon Structured List row style */
    .task-item {
      display: flex;
      align-items: center;
      gap: var(--cds-spacing-04);
      background: var(--cds-layer-01);
      border-bottom: 1px solid var(--cds-border-subtle-01);
      padding: var(--cds-spacing-04) var(--cds-spacing-05);
      transition: background .1s;
    }
    .task-item:first-child { border-top: 1px solid var(--cds-border-subtle-01); }
    .task-item:hover { background: #e8e8e8; }
    .task-item.done { background: var(--cds-background); }

    /* Carbon Checkbox */
    .cds--checkbox-wrapper {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      position: relative;
    }
    .cds--checkbox {
      position: absolute;
      opacity: 0;
      width: 16px;
      height: 16px;
      cursor: pointer;
      margin: 0;
      z-index: 1;
    }
    .cds--checkbox-appearance {
      width: 16px;
      height: 16px;
      border: 1px solid var(--cds-icon-primary);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      pointer-events: none;
    }
    .cds--checkbox:checked + .cds--checkbox-appearance {
      background: var(--cds-interactive);
      border-color: var(--cds-interactive);
    }
    .cds--checkbox:checked + .cds--checkbox-appearance::after {
      content: '';
      display: block;
      width: 9px;
      height: 5px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
    }
    .cds--checkbox:focus + .cds--checkbox-appearance {
      outline: 2px solid var(--cds-focus);
      outline-offset: 1px;
    }

    .task-label {
      flex: 1;
      font-size: 14px;
      line-height: 1.42857;
      color: var(--cds-text-primary);
      cursor: pointer;
      letter-spacing: .16px;
    }
    .task-item.done .task-label {
      text-decoration: line-through;
      color: var(--cds-text-secondary);
    }

    /* Carbon Ghost icon button (delete) */
    .cds--btn--ghost--icon {
      background: none;
      border: none;
      color: var(--cds-icon-secondary);
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }
    .cds--btn--ghost--icon:hover {
      background: #e8e8e8;
      color: var(--cds-support-error);
    }
    .cds--btn--ghost--icon:focus {
      outline: 2px solid var(--cds-focus);
      outline-offset: -2px;
    }

    /* ── Checklist tab bar ── */
    .checklist-tabs {
      display: flex;
      gap: 0;
      padding: 0 var(--cds-spacing-05);
      background: var(--cds-background);
      border-bottom: 1px solid var(--cds-border-subtle-01);
      flex-shrink: 0;
    }
    .checklist-tab {
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      color: var(--cds-text-secondary);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px var(--cds-spacing-05);
      cursor: pointer;
      letter-spacing: .16px;
      transition: color .1s, border-color .1s;
      margin-bottom: -1px;
    }
    .checklist-tab:hover { color: var(--cds-text-primary); }
    .checklist-tab.active {
      color: var(--cds-interactive);
      border-bottom-color: var(--cds-interactive);
      font-weight: 600;
    }
    .checklist-tab:focus {
      outline: 2px solid var(--cds-focus);
      outline-offset: -2px;
    }

    /* ── Empty state (Carbon inline notification style) ── */
    #empty-msg {
      display: none;
      margin-top: var(--cds-spacing-07);
      padding: var(--cds-spacing-05);
      background: var(--cds-layer-01);
      border-left: 3px solid var(--cds-interactive);
      color: var(--cds-text-secondary);
      font-size: 14px;
      letter-spacing: .16px;
    }

    /* ── Bob tamagotchi widget (bottom-right) ── */
    #bob-widget {
      position: fixed;
      bottom: var(--cds-spacing-05);
      right: var(--cds-spacing-05);
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 100;
      pointer-events: none;
    }
    /* Speech bubble above Bob */
    #bob-quip {
      background: var(--cds-layer-01);
      border: 1px solid var(--cds-border-subtle-01);
      border-left: 3px solid var(--cds-interactive);
      padding: 6px 8px;
      font-size: 11px;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--cds-text-primary);
      line-height: 1.4;
      letter-spacing: .16px;
      width: 180px;
      /* Tail pointing down-center */
      position: relative;
      margin-bottom: 6px;
    }
    #bob-quip::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid var(--cds-border-subtle-01);
    }
    #bob-quip::before {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid var(--cds-layer-01);
      z-index: 1;
    }
    #bob-sprite-wrap {
      width: 120px;
    }
    #bob-sprite {
      width: 120px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Carbon UI Shell Header -->
  <header class="cds--header" role="banner">
    <a class="cds--header__name" href="#">IBM Bob <span>Notepad</span></a>
    <div class="header-health" aria-label="Bob's health">
      <span id="health-label">Bob: 100%</span>
      <div class="cds--progress-bar--header" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
        <div id="health-fill" class="cds--progress-bar__bar" style="width:100%"></div>
      </div>
    </div>
    <button id="bob-toggle-btn" class="cds--btn--ghost--sm">Show Bob</button>
  </header>

  <!-- Add task toolbar -->
  <div class="cds--toolbar">
    <div class="cds--form-item">
      <label class="cds--label" for="new-task-input">New task</label>
      <input
        id="new-task-input"
        class="cds--text-input"
        type="text"
        placeholder="Describe your task…"
        autocomplete="off"
        aria-label="New task"
      />
    </div>
    <button id="add-btn" class="cds--btn--primary">Add task</button>
  </div>

  <!-- Checklist tabs -->
  <div class="checklist-tabs" role="tablist" aria-label="Checklist period">
    <button class="checklist-tab active" role="tab" aria-selected="true"  data-tab="daily"   id="tab-daily">Daily</button>
    <button class="checklist-tab"        role="tab" aria-selected="false" data-tab="weekly"  id="tab-weekly">Weekly</button>
    <button class="checklist-tab"        role="tab" aria-selected="false" data-tab="monthly" id="tab-monthly">Monthly</button>
  </div>

  <!-- Task list -->
  <div id="task-list-wrapper">
    <ul id="task-list" role="list"></ul>
    <div id="empty-msg" role="status">No tasks yet — add one above to get started.</div>
  </div>

  <!-- IBM Bob tamagotchi — official ibm.com asset -->

    <div id="bob-quip">Hello! Add some tasks!</div>

  <script>
    /* ── State ── */
    let state = {
      daily: [], weekly: [], monthly: [],
      activeTab: 'daily',
      health: 100,
      bobVisible: false
    };

    function activeTasks() { return state[state.activeTab]; }

    function loadState() {
      try {
        const saved = localStorage.getItem('bob-state');
        if (saved) {
          const parsed = JSON.parse(saved);
          // Migrate old single-array format
          if (Array.isArray(parsed.tasks)) {
            state.daily     = parsed.tasks;
            state.weekly    = [];
            state.monthly   = [];
            state.activeTab = 'daily';
            state.health    = parsed.health ?? 100;
            state.bobVisible = parsed.bobVisible ?? false;
          } else {
            state = parsed;
          }
        }
      } catch (_) {}
    }

    function saveAndBroadcast() {
      localStorage.setItem('bob-state', JSON.stringify(state));
      if (window.electronAPI) window.electronAPI.broadcastState(JSON.stringify(state));
    }

    /* ── Health calculation ── */
    function recalcHealth() {
      const tasks = activeTasks();
      if (tasks.length === 0) { state.health = 100; return; }
      const done = tasks.filter(t => t.done).length;
      state.health = Math.round((done / tasks.length) * 100);
    }

    /* ── Render ── */
    function render() {
      const list  = document.getElementById('task-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';

      // Sync tab active state
      document.querySelectorAll('.checklist-tab').forEach(btn => {
        const active = btn.dataset.tab === state.activeTab;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
      });

      const tasks = activeTasks();
      if (tasks.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        tasks.forEach((task, idx) => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.done ? ' done' : '');

          // Carbon checkbox
          const cbWrap = document.createElement('label');
          cbWrap.className = 'cds--checkbox-wrapper';
          cbWrap.title = task.done ? 'Mark incomplete' : 'Mark complete';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.className = 'cds--checkbox';
          cb.checked = task.done;
          cb.setAttribute('aria-label', task.text);
          cb.addEventListener('change', () => toggleTask(idx));

          const cbAppearance = document.createElement('span');
          cbAppearance.className = 'cds--checkbox-appearance';

          cbWrap.appendChild(cb);
          cbWrap.appendChild(cbAppearance);

          const label = document.createElement('span');
          label.className = 'task-label';
          label.textContent = task.text;
          label.addEventListener('click', () => toggleTask(idx));

          const del = document.createElement('button');
          del.className = 'cds--btn--ghost--icon';
          del.innerHTML = '&#x2715;';
          del.title = 'Delete task';
          del.setAttribute('aria-label', 'Delete: ' + task.text);
          del.addEventListener('click', () => deleteTask(idx));

          li.appendChild(cbWrap);
          li.appendChild(label);
          li.appendChild(del);
          list.appendChild(li);
        });
      }

      // Health bar
      const pct  = state.health;
      const fill = document.getElementById('health-fill');
      fill.style.width = pct + '%';
      fill.style.background =
        pct > 60 ? '#24a148' : pct > 30 ? '#f1c21b' : '#da1e28';
      document.getElementById('health-label').textContent = 'Bob: ' + pct + '%';
      document.querySelector('[role="progressbar"]').setAttribute('aria-valuenow', pct);

      // Toggle button label
      document.getElementById('bob-toggle-btn').textContent =
        state.bobVisible ? 'Hide Bob' : 'Show Bob';

      // Bob widget — pose + quip
      updateBobWidget(pct);
    }

    /* ── Bob widget ── */
    // pct = % of tasks completed (done/total * 100)
    // Mood thresholds (based on tasks REMAINING):
    //   celebrate    — 100% done (0 remaining)
    //   happy        — <25% remaining  (pct >= 75 and tasks exist)
    //   slightlyHappy— <50% remaining  (pct >= 50)
    //   neutral      — <75% remaining  (pct >= 25)
    //   sad          — >=75% remaining (pct <  25)

    // Mouth path `d` values — cubic bezier on the face rectangle
    // Baseline anchor points: M144.5,174.4 ... 30,0 (end at 174.5,174.4)
    // Control points shift the arc up (smile) or down (frown)
    const BOB_MOUTHS = {
      celebrate:     'M138,172 c8,16,34,16,42,0',      // huge wide smile
      happy:         'M142,174 c10,13,24,13,34,0',      // big smile
      slightlyHappy: 'M144.5,174.4 c12,5,18,5.5,30,0', // original gentle smile
      neutral:       'M144.5,175 c10,0,20,0,30,0',     // flat line
      sad:           'M144.5,174 c10,-8,20,-8,30,0',    // frown
    };

    const BOB_QUIPS = {
      celebrate:     ['All done! I\'m so proud!', 'ZERO tasks left — legendary!', 'You actually did it!!', 'Nothing left to do. Hero!', '100%! Bob does a happy dance!'],
      happy:         ['Almost there!', 'Just a few left!', 'So close — keep going!', 'Nearly finished!', 'The end is in sight!'],
      slightlyHappy: ['Good progress!', 'More than halfway!', 'You\'ve got this.', 'Keep it up!', 'Doing great so far!'],
      neutral:       ['Steady progress.', 'Halfway there!', 'Keep chipping away.', 'A few more tasks to go.', 'You can do it!'],
      sad:           ['I believe in you\u2026', 'Please complete some tasks!', 'I need those checkmarks\u2026', 'Don\'t give up on me!', 'Tasks = my life force.'],
    };
    let _lastQuip = '';

    function getMood(pct) {
      const tasks = activeTasks();
      if (tasks.length === 0)  return 'celebrate'; // no tasks → nothing to do
      if (pct === 100)         return 'celebrate'; // all done
      if (pct >= 75)           return 'happy';
      if (pct >= 50)           return 'slightlyHappy';
      if (pct >= 25)           return 'neutral';
      return 'sad';
    }

    function updateBobWidget(pct) {
      const mood = getMood(pct);

      // Swap mouth shape
      const mouth = document.getElementById('bob-mouth');
      if (mouth) mouth.setAttribute('d', BOB_MOUTHS[mood]);

      // Quip — pick a new one from the right mood pool
      const pool = BOB_QUIPS[mood];
      let quip   = pool[Math.floor(Math.random() * pool.length)];
      // avoid repeating the same quip twice in a row
      if (quip === _lastQuip && pool.length > 1) quip = pool[(pool.indexOf(quip) + 1) % pool.length];
      _lastQuip = quip;
      document.getElementById('bob-quip').textContent = quip;
    }

    /* Rotate quip every 10 s */
    setInterval(() => updateBobWidget(state.health), 10000);

    /* ── Actions ── */
    function addTask(text) {
      text = text.trim();
      if (!text) return;
      activeTasks().push({ id: Date.now(), text, done: false });
      recalcHealth();
      saveAndBroadcast();
      render();
    }

    function toggleTask(idx) {
      activeTasks()[idx].done = !activeTasks()[idx].done;
      recalcHealth();
      saveAndBroadcast();
      render();
    }

    function deleteTask(idx) {
      activeTasks().splice(idx, 1);
      recalcHealth();
      saveAndBroadcast();
      render();
    }

    /* ── UI events ── */
    document.getElementById('add-btn').addEventListener('click', () => {
      const input = document.getElementById('new-task-input');
      addTask(input.value);
      input.value = '';
      input.focus();
    });

    document.getElementById('new-task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        addTask(e.target.value);
        e.target.value = '';
      }
    });

    // Tab switching
    document.querySelectorAll('.checklist-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        state.activeTab = btn.dataset.tab;
        recalcHealth();
        saveAndBroadcast();
        render();
      });
    });

    document.getElementById('bob-toggle-btn').addEventListener('click', () => {
      state.bobVisible = !state.bobVisible;
      if (window.electronAPI) {
        if (state.bobVisible) window.electronAPI.openBobPopup();
        else window.electronAPI.closeBobPopup();
      }
      saveAndBroadcast();
      render();
    });

    /* ── IPC sync from Bob popup ── */
    if (window.electronAPI) {
      window.electronAPI.onBobClosed(() => {
        state.bobVisible = false;
        render();
      });
      window.electronAPI.onStateSync(json => {
        try { state = JSON.parse(json); } catch (_) {}
        render();
      });
    }

    /* ── Boot ── */
    loadState();
    render();
  </script>
</body>
</html>
